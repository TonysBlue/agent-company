[company]
product_name = 织象 PixWeave
cycle_task_limit = 2

[paths]
database = data/company.sqlite3
chairman_inbox = data/chairman/inbox
chairman_outbox = data/chairman/outbox
artifacts = data/artifacts
logs = logs

[backend]
name = local
codex_enabled = false

[governance]
reserved_actions = external_publish,external_spend,legal_commitment,contract_signature,production_deploy,data_export,pricing_change

[ceo_runtime]
# Uses the Hermes default profile implicitly. The CLI has no --profile flag here.
hermes_timeout_seconds = 120
# Set false for fixture verification or before Weixin delivery is configured.
external_delivery_enabled = true
